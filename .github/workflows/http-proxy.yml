name: Simple HTTP Proxy with Tunnel

on:
  workflow_dispatch:

jobs:
  proxy:
    runs-on: ubuntu-latest
    steps:
      - name: Install SSH client (for localhost.run)
        run: sudo apt-get update && sudo apt-get install -y openssh-client
        
      - name: Start HTTP Proxy and Create Tunnel
        run: |
          echo "Starting HTTP proxy on port 8080..."
          # راه‌اندازی پراکسی socat در پس‌زمینه
          socat TCP-LISTEN:8080,fork,reuseaddr TCP:httpbin.org:80 &
          
          echo "Creating public tunnel to our proxy using localhost.run..."
          echo "============================================================="
          echo "YOUR PROXY URL WILL APPEAR BELOW THIS LINE (wait up to 30 seconds):"
          # ایجاد تونل. از آنجایی که localhost.run نیاز به SSH دارد، یک دستور ssh می‌فرستیم.
          # توجه: گاهی اوقات localhost.run خطاهای موقت می‌دهد. اگر بار اول جواب نداد، Workflow را دوباره اجرا کنید.
          ssh -o "StrictHostKeyChecking=no" -R 80:localhost:8080 localhost.run
          
          echo "Tunnel established. Keeping it alive for 10 minutes..."
          sleep 600
