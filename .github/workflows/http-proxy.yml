name: HTTP Proxy with Bore Tunnel

on:
  workflow_dispatch:

jobs:
  proxy:
    runs-on: ubuntu-latest
    steps:
      - name: Install Bore
        run: |
          curl -L https://github.com/ekzhang/bore/releases/download/v0.5.2/bore-v0.5.2-x86_64-unknown-linux-musl.tar.gz | tar xz
          chmod +x bore
          sudo mv bore /usr/local/bin/

      - name: Start HTTP Proxy
        run: |
          python3 -m http.server 8080 &

      - name: Create Bore Tunnel
        run: |
          echo "Creating public tunnel to our proxy..."
          echo "=================================="
          echo "YOUR PROXY URL WILL APPEAR BELOW:"
          # اجرای تونل. bore یک لینک عمومی ایجاد می‌کند
          bore local 8080 --to bore.pub
