name: Simple Connection Test

on:
  workflow_dispatch:

jobs:
  connection-test:
    runs-on: ubuntu-latest
    steps:
      - name: Test outbound connection to HTTP website
        run: |
          echo "Trying to connect to a neutral website (httpbin.org) via HTTP..."
          curl -v http://httpbin.org/ip
          
      - name: Test outbound connection to HTTPS website
        run: |
          echo "Trying to connect to a neutral website (httpbin.org) via HTTPS..."
          curl -v https://httpbin.org/ip
          
      - name: Check DNS resolution
        run: |
          echo "Checking DNS resolution for google.com..."
          nslookup google.com
